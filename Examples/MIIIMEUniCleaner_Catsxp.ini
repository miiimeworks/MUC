; MIIIME Universal Cleaner Configuration
; ⓒ 2026 MIIIME

; 이 파일은 ANSI 인코딩으로 저장되어야 함.
; This file must be saved in ANSI encoding.

[Launch]
AppName=MIIIME Universal Cleaner

[Settings]
RunAsAdmin=0
ShowFinishMsg=1

[Options]
LogLevel=0

[Advanced]
RetryLimit=10
RetryDelay=50
LogRotationSize=5242880

[CleanupExclude]
01={Dat}\User Data\Default

; ── [필수] 보안 및 인터페이스 설정 (툴바 아이콘 고정 및 익스텐션 권한) ──
02={Dat}\User Data\Default\Preferences
03={Dat}\User Data\Default\Secure Preferences
04={Dat}\User Data\Default\PreferredApps
05={Dat}\User Data\Default\Web Data
06={Dat}\User Data\Default\Web Data-journal

; ── [필수] 익스텐션 데이터 (설정값 보존 핵심) ──
07={Dat}\User Data\Default\Extensions
08={Dat}\User Data\Default\Extension Rules
09={Dat}\User Data\Default\Extension State
10={Dat}\User Data\Default\Extension Scripts
11={Dat}\User Data\Default\Local Extension Settings
12={Dat}\User Data\Default\Sync Extension Settings
13={Dat}\User Data\Default\Managed Extension Storage
14={Dat}\User Data\Default\DNR Extension Rules

; ── [필수] 웹 저장소 (익스텐션 내부 설정값이 여기에 저장되는 경우가 많음) ──
15={Dat}\User Data\Default\Local Storage
16={Dat}\User Data\Default\Session Storage
17={Dat}\User Data\Default\IndexedDB
18={Dat}\User Data\Default\Databases

; ── [필수] 사용자 데이터 (북마크, 계정, 방문 기록) ──
19={Dat}\User Data\Default\Bookmarks
20={Dat}\User Data\Default\Bookmarks.bak
21={Dat}\User Data\Default\Login Data
22={Dat}\User Data\Default\Login Data For Account
23={Dat}\User Data\Default\History
24={Dat}\User Data\Default\History-journal
25={Dat}\User Data\Default\Favicons
26={Dat}\User Data\Default\Favicons-journal

; ── [필수] 보관 시 탭 및 세션 유지 ──
27={Dat}\User Data\Default\Sessions
28={Dat}\User Data\Default\Session Storage

; ── [필수] 기타 UI 데이터 ──
29={Dat}\User Data\Default\Shortcuts
30={Dat}\User Data\Default\Visited Links
31={Dat}\User Data\Default\Network Action Predictor
32={Dat}\User Data\Default\Site Characteristics Database
33={Dat}\User Data\Default\Sync Data

34={Dat}\User Data\Default\Network

35={Dat}\User Data\First Run
36={Dat}\User Data\Last Browser
37={Dat}\User Data\Last Version
38={Dat}\User Data\Local State
39={Dat}\User Data\Variations

40={Dat}\User Data
41={Dat}\Reg
42={Dat}\State.ini

[CleanupDelete]
01={Programs}\Catsxp.lnk
02={StartMenu}\Catsxp.lnk
03={CommonPrograms}\Catsxp.lnk
04={CommonStartMenu}\Catsxp.lnk
05={Desktop}\Catsxp.lnk
