; MIIIME Universal Cleaner Configuration
; © 2026 MIIIME

; 이 파일은 ANSI 인코딩으로 저장되어야 함.
; This file must be saved in ANSI encoding.

[Launch]
; 메시지 창 등에 표시되는 프로그램 이름.
; Application name shown in message boxes, etc.
AppName=MIIIME Universal Cleaner

[Settings]
; 관리자 권한으로 실행 (1=사용, 0=미사용).
; Run as administrator (1=Enable, 0=Disable).
RunAsAdmin=0

; 작업 완료 후 메시지 표시 (1=표시, 0=미표시).
; Show completion message after tasks finish (1=Show, 0=Hide).
ShowFinishMsg=1

[Options]
; LogLevel : 0=Off, 1=All(INFO/WARN/ERROR), 2=DEBUG, 3=INFO, 4=WARN, 5=ERROR
LogLevel=0

[Advanced]
; 파일 이동/삭제 실패 시 재시도 횟수.
; Number of retries on file move/delete failure.
RetryLimit=10

; 재시도 간격 (밀리초).
; Retry interval (milliseconds).
RetryDelay=50

; 로그 파일 최대 크기 (Bytes, 초과 시 .old 로 백업 후 새로 시작) 기본값 5242880 = 5MB.
; Maximum log file size in bytes (rotates to .old when exceeded) default 5242880 = 5MB.
LogRotationSize=5242880

[CleanupExclude]
; 지정되지 않은 항목 삭제 (Exclude 방식)
; Delete unspecified items (Exclude mode)
; ----------------------------------------------------------------------------------------

; ※ 독립 모드 전용 / Standalone mode only.
; 이 섹션에 항목이 1개 이상 있으면 독립 모드로 동작합니다. (*_M.ini 탐색 건너뜀).
; If one or more entries exist in this section, standalone mode is activated. (Skips *_M.ini search).

; 매크로 지원 / Macros supported : {Base} {Local} {Roaming} {LocalLow} {Temp} {UserProfile} %ENV%

; 와일드카드 / Wildcards  : * ? #
;   #   소문자 16진수 1글자 / One lowercase hex character
;       예 / e.g.) ################.json → 16자리 hex 파일명에만 매칭

; 예시 / Example:
; 01={Roaming}\MyApp\profile\prefs.js
; 02={Roaming}\MyApp\profile\chrome
; → {Roaming}\MyApp\profile 폴더 안에서 prefs.js, chrome 보존하고 나머지 삭제.

[CleanupDelete]
; 지정 항목 삭제 (Delete 방식)
; Delete specified items (Delete mode)
; ----------------------------------------------------------------------------------------

; ※ 독립 모드 전용 / Standalone mode only.
; 이 섹션에 경로 항목이 1개 이상 있으면 독립 모드로 동작합니다. (*_M.ini 탐색 건너뜀)
; If one or more path entries exist in this section, standalone mode is activated. (Skips *_M.ini search)

; 매크로 지원, 와일드카드 : 상동
; Macros supported, Wildcards : Same as above

; 예시 / Example:
; 01={Roaming}\MyApp\Cache
; 02={Local}\MyApp\BrowserMetrics
; 03={Temp}\MyApp_Temp_*
; 04={Roaming}\Obsidian\################.json
